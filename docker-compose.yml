version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vulnblog-api
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./backend/instance:/app/instance
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: vulnblog-fe
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend